```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            margin-top:40px;
            box-shadow:0px 0px 15px rgba(0,0,0,.1);
        }

        input,textarea{
            margin-bottom:15px;
        }
    </style>
</head>

<body>

<div class="container">

<div class="box">

<h1 class="text-center mb-4">
🤖 AI Resume Builder
</h1>

<form action="/resume" method="POST" enctype="multipart/form-data">

<label>Name</label>

<input
type="text"
class="form-control"
name="name"
required>

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
required>

<label>Phone</label>

<input
type="text"
class="form-control"
name="phone"
required>

<label>Education</label>

<textarea
class="form-control"
name="education"
rows="3"
required></textarea>

<label>Projects</label>

<textarea
class="form-control"
name="projects"
rows="3"></textarea>

<label>Experience</label>

<textarea
class="form-control"
name="experience"
rows="3"></textarea>

<label>Certifications</label>

<textarea
class="form-control"
name="certifications"
rows="2"></textarea>

<label>LinkedIn</label>

<input
type="text"
class="form-control"
name="linkedin">

<label>GitHub</label>

<input
type="text"
class="form-control"
name="github">

<label>Portfolio</label>

<input
type="text"
class="form-control"
name="portfolio">

<label>Technical Skills</label>

<textarea
class="form-control"
name="skills"
rows="3"
required></textarea>

<label>Upload Photo (Optional)</label>

<input
type="file"
class="form-control"
name="photo">

<br>

<div class="text-center">

<button
class="btn btn-primary btn-lg"
type="submit">

Generate Resume

</button>

</div>

</form>

</div>

</div>

</body>
</html>
```
